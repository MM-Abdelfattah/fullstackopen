!<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <img src="#" />

    <script>
      const img = document.querySelector("img");
      async function getApi() {
        try {
          const api = await fetch(
            "https://api.giphy.com/v1/gifs/translate?api_key=xbSbgpkqV7pY9mvOEXRApATdFZZq5FRS&s=cats",
          );
          const Data = await api.json();
          img.src = Data.data.images.original.url;
        } catch (error) {
          console.error(error);
        }
      }
      getApi();
    </script>
  </body>
</html>
